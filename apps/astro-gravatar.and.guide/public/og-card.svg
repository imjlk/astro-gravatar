    <text x="128" y="168" fill="#0f1729" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700">Junglei Kim</text>
    <text x="128" y="198" fill="#425372" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16">Profile card preview</text>

    <rect x="166" y="260" width="141" height="72" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.16)"/>
    <g transform="translate(28 252)">
      <rect width="108" height="108" rx="18" fill="#ffffff"/>
      <g fill="#0f1729">
        <rect x="14" y="14" width="12" height="12"/>
        <rect x="30" y="14" width="12" height="12"/>
        <rect x="46" y="14" width="12" height="12"/>
        <rect x="14" y="30" width="12" height="12"/>
        <rect x="46" y="30" width="12" height="12"/>
        <rect x="14" y="46" width="12" height="12"/>
        <rect x="30" y="46" width="12" height="12"/>
        <rect x="46" y="46" width="12" height="12"/>
        <rect x="70" y="14" width="24" height="24"/>
        <rect x="70" y="46" width="12" height="12"/>
        <rect x="86" y="46" width="8" height="8"/>
        <rect x="70" y="70" width="12" height="12"/>
        <rect x="14" y="70" width="24" height="24"/>
        <rect x="46" y="70" width="12" height="12"/>
