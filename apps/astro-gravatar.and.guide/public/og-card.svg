<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Astro Gravatar</title>
  <desc id="desc">Astro-native Gravatar avatars, profile cards, and QR codes for production sites.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="50%" stop-color="#173786"/>
      <stop offset="100%" stop-color="#2f5bff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bfd2ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#bfd2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1035" cy="92" r="182" fill="url(#glow)"/>
  <circle cx="153" cy="558" r="210" fill="url(#glow)" opacity="0.35"/>

  <g transform="translate(80 92)">
    <text x="0" y="0" fill="#9eb8ff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="4">ASTRO-NATIVE GRAVATAR COMPONENTS</text>
    <text x="0" y="86" fill="#ffffff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="800">Astro Gravatar</text>
    <text x="0" y="150" fill="#d7e3ff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34">
      Avatars, profile cards, and QR codes for production sites.
    </text>

    <g transform="translate(0 230)">
      <rect width="340" height="56" rx="28" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.24)"/>
      <text x="26" y="36" fill="#dfe8ff" font-family="ui-monospace, SFMono-Regular, monospace" font-size="24">bun add astro-gravatar</text>
    </g>

    <g transform="translate(0 328)" fill="#e5eeff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">
      <text x="0" y="0">Astro 4–6</text>
      <text x="160" y="0">TypeScript</text>
      <text x="346" y="0">Bun-first</text>
      <text x="508" y="0">MIT</text>
    </g>
  </g>

  <g transform="translate(755 128)">
    <rect width="335" height="360" rx="28" fill="rgba(7,12,23,0.46)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="70" cy="64" r="38" fill="#ffffff" opacity="0.9"/>
    <circle cx="70" cy="64" r="28" fill="#2f5bff"/>
    <circle cx="136" cy="64" r="30" fill="#ffffff" opacity="0.85"/>
    <circle cx="136" cy="64" r="22" fill="#7ea2ff"/>
    <circle cx="192" cy="64" r="24" fill="#ffffff" opacity="0.75"/>
    <circle cx="192" cy="64" r="17" fill="#173786"/>

    <rect x="28" y="116" width="279" height="118" rx="22" fill="rgba(255,255,255,0.92)"/>
    <circle cx="84" cy="175" r="28" fill="#dfe8ff"/>
